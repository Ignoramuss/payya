payya-server = { path = "crates/inference/payya-server" }
payya-kv-cache = { path = "crates/inference/payya-kv-cache" }
payya-speculative = { path = "crates/inference/payya-speculative" }
payya-quantization = { path = "crates/inference/payya-quantization" }
payya-prompt-cache = { path = "crates/inference/payya-prompt-cache" }
payya-reasoner = { path = "crates/agent/payya-reasoner" }
payya-agent = { path = "crates/agent/payya-agent" }
payya-function-call = { path = "crates/agent/payya-function-call" }
payya-semantic-router = { path = "crates/agent/payya-semantic-router" }
payya-code-interpreter = { path = "crates/agent/payya-code-interpreter" }
payya-structured-output = { path = "crates/agent/payya-structured-output" }
payya-vector-db = { path = "crates/data/payya-vector-db" }
payya-rag = { path = "crates/data/payya-rag" }
payya-graph-rag = { path = "crates/data/payya-graph-rag" }
payya-knowledge-graph = { path = "crates/data/payya-knowledge-graph" }
payya-feature-store = { path = "crates/data/payya-feature-store" }
payya-data-curation = { path = "crates/data/payya-data-curation" }
payya-synthetic-data = { path = "crates/data/payya-synthetic-data" }
payya-text-to-sql = { path = "crates/data/payya-text-to-sql" }
payya-recommendation = { path = "crates/data/payya-recommendation" }
payya-db-driver = { path = "crates/data/payya-db-driver" }
payya-guardrails = { path = "crates/safety/payya-guardrails" }
payya-eval = { path = "crates/safety/payya-eval" }
payya-adversarial = { path = "crates/safety/payya-adversarial" }
